name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FLUTTER_VERSION: 3.44.4

jobs:
  # Create the GitHub Release once; platform jobs upload their artifacts to it.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" --generate-notes

  # Signed with the stable upload keystore (repo secrets) so sideloaded
  # updates install over the previous version. Missing secrets → debug key.
  android:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Restore release keystore
        env:
          KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -z "$KEYSTORE" ]; then
            echo "no keystore secret; building debug-signed"
            exit 0
          fi
          echo "$KEYSTORE" | base64 -d > android/app/upload-keystore.jks
          echo "$KEY_PROPERTIES" > android/key.properties
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Upload APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk planka-android.apk
          gh release upload "$GITHUB_REF_NAME" planka-android.apk --clobber

  # Universal (arm64 + x86_64) macOS app. Unsigned — Gatekeeper will warn;
  # right-click > Open, or remove the quarantine attribute to run.
  macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package and upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          ditto -c -k --keepParent "$APP" planka-macos-universal.zip
          gh release upload "$GITHUB_REF_NAME" planka-macos-universal.zip --clobber

  # The repo has no windows/ platform, so scaffold it in CI before building.
  windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter config --enable-windows-desktop
      - run: flutter create --platforms=windows .
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package and upload
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath planka-windows-x64.zip
          gh release upload $env:GITHUB_REF_NAME planka-windows-x64.zip --clobber
