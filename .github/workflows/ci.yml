name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.4
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart analyze
      - run: flutter test
